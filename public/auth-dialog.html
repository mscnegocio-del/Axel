<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Iniciar sesión en Axel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 16px;
        background-color: #f9fafb;
      }
      .card {
        max-width: 400px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 0.75rem;
        box-shadow: 0 10px 15px rgba(15, 23, 42, 0.1);
        padding: 20px;
      }
      .title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 1rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
      }
      .tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
      }
      .tab {
        flex: 1;
        padding: 0.35rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        cursor: pointer;
        border: 1px solid #e5e7eb;
        background-color: #f9fafb;
        color: #4b5563;
      }
      .tab.active {
        background-color: #111827;
        color: #f9fafb;
        border-color: #111827;
      }
      .label {
        font-size: 0.75rem;
        color: #6b7280;
        margin-bottom: 0.25rem;
      }
      .input {
        width: 100%;
        padding: 0.4rem 0.5rem;
        border-radius: 0.375rem;
        border: 1px solid #d1d5db;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
        box-sizing: border-box;
      }
      .btn-email {
        background-color: #111827;
        color: #ffffff;
      }
      .error {
        font-size: 0.75rem;
        color: #dc2626;
        margin-top: 0.5rem;
      }
      .info {
        font-size: 0.75rem;
        color: #6b7280;
        margin-top: 0.5rem;
      }
    </style>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  </head>
  <body>
    <div class="card">
      <div class="title">Inicia sesión en Axel</div>
      <div class="subtitle">
        Usa tu correo y contraseña para acceder a Axel.
      </div>
      <div class="tabs">
        <button id="tab-signin" class="tab active">Iniciar sesión</button>
        <button id="tab-signup" class="tab">Registrarse</button>
      </div>
      <form id="signin-form">
        <div class="label">Correo electrónico</div>
        <input id="signin-email" class="input" type="email" required />
        <div class="label">Contraseña</div>
        <input id="signin-password" class="input" type="password" required />
        <button type="submit" class="btn btn-email">Entrar</button>
      </form>
      <div id="signin-switch" class="info" style="cursor: pointer; text-align: center">
        ¿No tienes cuenta? Regístrate
      </div>
      <form id="signup-form" style="display: none">
        <div class="label">Correo electrónico</div>
        <input id="signup-email" class="input" type="email" required />
        <div class="label">Contraseña</div>
        <input id="signup-password" class="input" type="password" required />
        <div class="label">Confirmar contraseña</div>
        <input id="signup-password-confirm" class="input" type="password" required />
        <button type="submit" class="btn btn-email">Registrarse</button>
      </form>
      <div id="error" class="error" style="display: none"></div>
      <div class="info">
        Tras registrarte, revisa tu correo para confirmar tu cuenta antes de
        iniciar sesión.
      </div>
    </div>

    <script>
      (function () {
        var supabaseUrl = "https://ughmkhjyzfdycuzrqzzb.supabase.co";
        var supabaseAnonKey =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaG1raGp5emZkeWN1enJxenpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDA0MzQsImV4cCI6MjA4ODQxNjQzNH0.Aunw2PVwVsoSc8gCBgexP9o3KmaH9Wbg9dNK24bCXAY";

        var supabaseClient = window.supabase.createClient(
          supabaseUrl,
          supabaseAnonKey
        );

        var errorEl = document.getElementById("error");
        var tabSignin = document.getElementById("tab-signin");
        var tabSignup = document.getElementById("tab-signup");
        var signinForm = document.getElementById("signin-form");
        var signupForm = document.getElementById("signup-form");
        var signinSwitch = document.getElementById("signin-switch");

        function showSignin() {
          tabSignin.classList.add("active");
          tabSignup.classList.remove("active");
          signinForm.style.display = "block";
          signupForm.style.display = "none";
          setError("");
        }

        function showSignup() {
          tabSignup.classList.add("active");
          tabSignin.classList.remove("active");
          signinForm.style.display = "none";
          signupForm.style.display = "block";
          setError("");
        }

        function setError(message) {
          errorEl.textContent = message;
          errorEl.style.display = message ? "block" : "none";
        }

        tabSignin.addEventListener("click", function () {
          showSignin();
        });

        tabSignup.addEventListener("click", function () {
          showSignup();
        });

        signinSwitch.addEventListener("click", function () {
          showSignup();
        });

        signinForm.addEventListener("submit", function (e) {
            e.preventDefault();
            setError("");

          var email = document.getElementById("signin-email").value;
          var password = document.getElementById("signin-password").value;

          supabaseClient.auth
            .signInWithPassword({ email: email, password: password })
            .then(function (result) {
              if (result.error) {
                throw result.error;
              }
              var session = result.data.session;
              if (!session) {
                throw new Error("No se recibió sesión de Supabase.");
              }

              Office.onReady(function () {
                Office.context.ui.messageParent(
                  JSON.stringify({
                    access_token: session.access_token,
                    refresh_token: session.refresh_token,
                  })
                );
                try {
                  if (Office.context && Office.context.ui) {
                    Office.context.ui.closeContainer();
                  }
                } catch (e) {
                  // ignore
                }

                // Actualizar el contenido del diálogo para indicar que puede cerrarse.
                try {
                  var card = document.querySelector(".card");
                  if (card) {
                    card.innerHTML =
                      '<div style="font-size:48px; color:#16a34a; margin-bottom:8px;">&#10003;</div>' +
                      '<div style="font-size:18px; font-weight:600; margin-bottom:4px;">¡Listo!</div>' +
                      '<div style="font-size:13px; color:#6b7280;">Ya puedes cerrar esta ventana y continuar en Excel.</div>';
                  }
                } catch (e) {
                  // ignore
                }

                // Algunos hosts permiten cerrar la ventana desde aquí; si no, el usuario la cierra manualmente.
                window.close();
              });
            })
            .catch(function (err) {
              setError(
                "Error al iniciar sesión: " + (err.message || String(err))
              );
            });
        });

        signupForm.addEventListener("submit", function (e) {
          e.preventDefault();
          setError("");

          var email = document.getElementById("signup-email").value;
          var password = document.getElementById("signup-password").value;
          var passwordConfirm = document.getElementById(
            "signup-password-confirm"
          ).value;

          if (password !== passwordConfirm) {
            setError("Las contraseñas no coinciden.");
            return;
          }

          supabaseClient.auth
            .signUp({
              email: email,
              password: password,
              options: {
                emailRedirectTo: "https://axel.habla.cloud/auth-callback.html",
              },
            })
            .then(function (result) {
              if (result.error) {
                throw result.error;
              }

              // Si hay usuario pero no sesión, es el caso típico de confirmación por email.
              if (result.data && result.data.user && !result.data.session) {
                setError(
                  "Revisa tu correo para confirmar tu cuenta antes de iniciar sesión."
                );
                return;
              }

              setError(
                "Revisa tu correo para confirmar tu cuenta antes de iniciar sesión."
              );
            })
            .catch(function (err) {
              var message = err && err.message ? String(err.message) : String(err);
              if (
                message.toLowerCase().includes("user already registered") ||
                message.toLowerCase().includes("already registered")
              ) {
                setError(
                  "Ya tienes una cuenta. Ve a Iniciar sesión (usa la pestaña de arriba)."
                );
                return;
              }
              setError("Error al registrarse: " + message);
            });
        });

        // Estado inicial: pestaña de inicio de sesión
        showSignin();
      })();
    </script>
  </body>
  </html>
